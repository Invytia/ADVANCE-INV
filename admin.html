<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Studio - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f4f5; --surface: #ffffff; --text: #18181b; --muted: #71717a; --accent: #09090b; --border: #e4e4e7; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--surface); border-radius: 16px; padding: 32px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 24px; }
        .stat-card { background: #fafafa; padding: 24px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #fafafa; font-weight: 600; }
        .action-input { width: 80px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; margin-right: 8px; }
        button.btn-primary { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button.btn-primary:disabled { opacity: 0.7; cursor: wait; }
    </style>
</head>
<body>

<div class="container">
    <h2>💻 Panel de Administración</h2>
    <div class="stat-card">
        <div style="color: var(--muted); font-size: 14px; margin-bottom: 8px;">Efectivo Total en Caja</div>
        <div style="font-size: 32px; font-weight: 600; color: var(--success);">$<span id="admin-cash">...</span></div>
    </div>
    <table>
        <thead>
            <tr><th>Producto</th><th>Precio</th><th>Stock Actual</th><th>Añadir Inventario</th></tr>
        </thead>
        <tbody id="admin-tbody"><tr><td colspan="4">Cargando base de datos...</td></tr></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = https://script.google.com/macros/s/AKfycbxzvNZEmnGoJFWSHnKILHaA6HlPRfNfoDBlWRDmEtlOv3M7SAQeISzUsdxV-1dpwe3r7A/exec;

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            document.getElementById('admin-cash').textContent = parseFloat(data.caja).toFixed(2);
            renderTable(data.inventario);
        } catch (e) {
            document.getElementById('admin-tbody').innerHTML = '<tr><td colspan="4">Error de conexión.</td></tr>';
        }
    }

    function renderTable(inventory) {
        const tbody = document.getElementById('admin-tbody');
        tbody.innerHTML = '';
        inventory.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td>$${item.price}</td>
                <td>${item.stock} uds</td>
                <td>
                    <input type="number" id="add-stock-${item.id}" class="action-input" min="1" placeholder="Cant">
                    <button class="btn-primary" id="btn-add-${item.id}" onclick="addStock(${item.id})">Sumar</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function addStock(id) {
        const input = document.getElementById(`add-stock-${id}`);
        const qty = parseInt(input.value);
        if (isNaN(qty) || qty <= 0) return;

        const btn = document.getElementById(`btn-add-${id}`);
        btn.textContent = '...';
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'addStock', id: id, qty: qty })
            });
            await loadData();
        } catch (e) {
            alert('Error al actualizar');
        }
    }

    loadData();
</script>
</body>
</html>
